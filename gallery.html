<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guardian Gallery — Neo‑Tokyo Hologram</title>

  <!-- CSS FILES -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/nav.css">

</head>

<body>

  <!-- NAVIGATION -->
  <nav>
    <div class="nav-logo">MOON MUSEUM</div>

    <div class="menu-btn">
      <div></div><div></div><div></div>
    </div>

    <div class="nav-links">
      <a href="index.html">Home</a>

      <p>Explore the Sailor Guardians in full holographic detail.</p>
    </section>

    <!-- GALLERY GRID -->
    <section class="gallery-grid">

      <!-- USAGI -->
      <a href="player-usagi.html" class="card">
        <div class="card-inner">
          <div class="card-front">
            <img src="images/usagi-front.jpeg" alt="Usagi Tsukino">
          </div>
          <div class="card-back">
            <img src="images/usagi-back.jpeg" alt="Usagi Transformation">

              Speed: 80<br>
              Magic: 100
            </div>
          </div>
        </div>
      </a>

      <!-- AMI -->
      <a href="player-ami.html" class="card">
        <div class="card-inner">
          <div class="card-front">
            <img src="images/ami-front.jpeg" alt="Ami Mizuno">

          <div class="card-back">

              Power: 70<br>

        </div>

            <img src="images/rei-front.jpeg" alt="Rei Hino">

      <a href="player-minako.html" class="card">
        <div class="card-inner">
          <div class="card-front">
            <img src="images/minako-front.jpeg" alt="Minako Aino">
